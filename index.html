<html lang="vi">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'm3-light-primary': '#9c4245',
                        'm3-light-on-primary': '#ffffff',
                        'm3-light-primary-container': '#ffdad9',
                        'm3-light-on-primary-container': '#400208',
                        'm3-light-surface': '#fffbff',
                        'm3-light-on-surface': '#201a1a',
                        'm3-light-surface-variant': '#f4dddd',
                        'm3-light-outline': '#857372',
                        'm3-dark-primary': '#ffb3b3',
                        'm3-dark-on-primary': '#5f131b',
                        'm3-dark-primary-container': '#7e2a2f',
                        'm3-dark-on-primary-container': '#ffdad9',
                        'm3-dark-surface': '#1a1111',
                        'm3-dark-on-surface': '#ece0df',
                        'm3-dark-surface-variant': '#534343',
                        'm3-dark-outline': '#a08c8c',
                        'facebook-blue': '#1877F2',
                    },
                    borderRadius: {
                        'm3-xl': '28px',
                        'm3-2xl': '32px',
                    }
                }
            }
        }

    <style>
        body {
            font-family: 'Lexend', sans-serif;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .m3-bg-ornament {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            border-radius: 100%;
            opacity: 0.5;
            pointer-events: none;
        }
        
        .shape-1 { width: 40vw; height: 40vw; top: -10vw; left: -10vw; background: #ffdad9; }
        .dark .shape-1 { background: #5f131b; opacity: 0.3; }
        .shape-2 { width: 35vw; height: 35vw; bottom: 5%; right: -5vw; background: #f4dddd; }
        .dark .shape-2 { background: #7e2a2f; opacity: 0.2; }

        .m3-card {
            transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        @media (min-width: 768px) {
            .m3-card-interactive:hover {
                transform: translateY(-8px) scale(1.01);
                box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
            }
        }

        .ripple { position: relative; overflow: hidden; }
        .ripple:active:after { content: ""; display: block; position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: rgba(255,255,255,0.2); }

        /* Lightbox Fix */
        #image-modal {
            transition: opacity 0.3s ease;
            display: flex;
        }
        #modal-img {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hidden-modal {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
        .hidden-modal #modal-img {
            transform: scale(0.8);
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-floating { animation: floating 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-m3-light-surface dark:bg-m3-dark-surface text-m3-light-on-surface dark:text-m3-dark-on-surface min-h-screen">

    <div class="m3-bg-ornament shape-1"></div>
    <div class="m3-bg-ornament shape-2"></div>

            <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24">

            <svg id="theme-toggle-light-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 15a5 5 0 100-10 5 5 0 000 10zM10 0a1 1 0 011 1v2a1 1 0 11-2 0V1a1 1 0 011-1zM10 17a1 1 0 011 1v2a1 1 0 11-2 0v-2a1 1 0 011-1zM3.515 3.515a1 1 0 011.414 0l1.414 1.414a1 1 0 11-1.414 1.414L3.515 4.93a1 1 0 010-1.414zM13.657 13.657a1 1 0 011.414 0l1.414 1.414a1 1 0 11-1.414 1.414l-1.414-1.414a1 1 0 010-1.414zM0 10a1 1 0 011-1h2a1 1 0 110 2H1a1 1 0 01-1-1zM17 10a1 1 0 011-1h2a1 1 0 110 2h-2a1 1 0 01-1-1zM3.515 16.485a1 1 0 010-1.414l1.414-1.414a1 1 0 111.414 1.414l-1.414 1.414a1 1 0 01-1.414 0zM13.657 6.343a1 1 0 010-1.414l1.414-1.414a1 1 0 111.414 1.414L15.07 6.343a1 1 0 01-1.414 0z"></path></svg>

        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

                    <a href="https://www.google.com/maps/search/?api=1&query=15+Lê+Lợi+Đắk+Đoa+Gia+Lai" target="_blank" class="flex items-center space-x-4 p-4 rounded-2xl hover:bg-black/5 dark:hover:bg-white/5 transition-all">
                        <div class="bg-m3-light-primary dark:bg-m3-dark-primary text-white p-3 rounded-xl">

                    </div>

            </div>

            <div class="lg:col-span-7 grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div onclick="openModal('851.jpg')" class="sm:col-span-2 rounded-m3-2xl overflow-hidden shadow-xl cursor-zoom-in group border-2 border-white/20">

    <div id="image-modal" class="hidden-modal fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md cursor-zoom-out" onclick="closeModal()">

                 class="max-w-full max-h-full rounded-2xl shadow-2xl cursor-default pointer-events-auto" 
                 onclick="event.stopPropagation()">
        </div>
    </div>

    <script>
        // --- QUẢN LÝ GIAO DIỆN (THEME LOGIC) ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        function updateThemeUI(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                themeToggleLightIcon.classList.remove('hidden');
                themeToggleDarkIcon.classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                themeToggleDarkIcon.classList.remove('hidden');
                themeToggleLightIcon.classList.add('hidden');
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('color-theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)');

            if (savedTheme) {
                updateThemeUI(savedTheme === 'dark');
            } else {
                updateThemeUI(systemPrefersDark.matches);
            }

            systemPrefersDark.addEventListener('change', (e) => {
                if (!localStorage.getItem('color-theme')) {
                    updateThemeUI(e.matches);
                }
            });
        }

        themeToggleBtn.addEventListener('click', function() {
            const isDarkNow = document.documentElement.classList.contains('dark');
            const newTheme = !isDarkNow;
            updateThemeUI(newTheme);
            localStorage.setItem('color-theme', newTheme ? 'dark' : 'light');
        });

        // --- QUẢN LÝ XEM ẢNH (MODAL LOGIC) ---
        const modal = document.getElementById('image-modal');
        const modalImg = document.getElementById('modal-img');

        function openModal(src) {
            modalImg.src = src;
            modal.classList.remove('hidden-modal');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('hidden-modal');
            document.body.style.overflow = '';
            setTimeout(() => { if(modal.classList.contains('hidden-modal')) modalImg.src = ''; }, 400);
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        // Chạy khởi tạo
        initTheme();
    </script>
