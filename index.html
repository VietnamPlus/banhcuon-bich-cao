<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bánh Cuốn Nóng Bích Cao - Đắk Đoa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #fff5f5;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="text-slate-800 pb-12">

    <!-- Header Section -->
    <header class="max-w-md mx-auto pt-8 px-6 text-center">
        <div class="relative inline-block mb-4">
            <img src="856.jpg" alt="Logo Bích Cao" class="w-32 h-32 rounded-full shadow-lg border-4 border-white mx-auto object-cover" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
        </div>
        <h1 class="text-3xl font-bold text-red-600 mb-1 uppercase tracking-tight">Bánh Cuốn Nóng</h1>
        <h2 class="text-2xl font-semibold text-slate-700 italic">Bích Cao</h2>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto mt-6 px-4 space-y-6">
        
        <!-- Info Card -->
        <section class="glass-card rounded-3xl p-6 shadow-sm border border-red-100">
            <div class="space-y-4">
                <div class="flex items-center space-x-3 text-lg">
                    <span class="bg-red-100 p-2 rounded-full text-red-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </span>
                    <p class="font-medium">15 Lê Lợi, Đắk Đoa</p>
                </div>

                <div class="flex items-center space-x-3 text-lg">
                    <span class="bg-green-100 p-2 rounded-full text-green-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                    </span>
                    <a href="tel:0917724781" class="font-bold text-slate-800 hover:text-red-600 transition-colors">0917.724.781</a>
                </div>

                <div class="flex items-center space-x-3 text-lg">
                    <span class="bg-blue-100 p-2 rounded-full text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </span>
                    <p class="font-medium text-blue-700 italic">Ship tận nơi quanh chợ Đắk Đoa</p>
                </div>
            </div>
        </section>

        <!-- Price Table -->
        <section class="glass-card rounded-3xl p-6 shadow-sm border border-red-100 overflow-hidden">
            <h3 class="text-xl font-bold mb-4 flex items-center">
                <span class="w-1.5 h-6 bg-red-500 rounded-full mr-2"></span>
                Bảng Giá Menu
            </h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                    <span class="font-medium">Phần nhỏ</span>
                    <span class="text-red-600 font-bold">15K</span>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                    <span class="font-medium">Phần vừa</span>
                    <span class="text-red-600 font-bold">20K</span>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                    <span class="font-medium">Phần lớn</span>
                    <span class="text-red-600 font-bold">25K</span>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                    <span class="font-medium">Đặc biệt</span>
                    <span class="text-red-600 font-bold">30K</span>
                </div>
            </div>
        </section>

        <!-- Gallery Section -->
        <section class="space-y-4 pt-2">
            <h3 class="text-xl font-bold px-2 flex items-center">
                <span class="w-1.5 h-6 bg-red-500 rounded-full mr-2"></span>
                Hình ảnh thực tế
            </h3>
            <div class="grid grid-cols-1 gap-4">
                <div class="overflow-hidden rounded-3xl shadow-md bg-white">
                    <img src="851.jpg" alt="Thịt heo quay giòn" class="w-full h-64 object-cover hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/600x400?text=Thit+Heo+Quay'">
                    <div class="p-3 bg-white/90">
                        <p class="text-center font-semibold text-red-600 uppercase text-sm tracking-widest">Heo Quay Giòn Rụm</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="overflow-hidden rounded-3xl shadow-md bg-white">
                        <img src="853.jpg" alt="Bánh cuốn đóng hộp" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=Banh+Cuon+Hop'">
                    </div>
                    <div class="overflow-hidden rounded-3xl shadow-md bg-white">
                        <img src="852.jpg" alt="Bánh cuốn trên dĩa" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=Banh+Cuon+Dia'">
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer Call to Action -->
        <footer class="pt-6">
            <a href="tel:0917724781" class="block w-full bg-red-600 text-white text-center py-4 rounded-full font-bold text-xl shadow-lg hover:bg-red-700 active:scale-95 transition-all">
                GỌI ĐẶT HÀNG NGAY
            </a>
            <p class="text-center mt-4 text-slate-400 text-sm">Rất hân hạnh được phục vụ quý khách!</p>
        </footer>
    </main>

</body>
</html>
