<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bánh Cuốn Nóng Bích Cao - Đắk Đoa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'm3-light-primary': '#9c4245',
                        'm3-light-on-primary': '#ffffff',
                        'm3-light-primary-container': '#ffdad9',
                        'm3-light-on-primary-container': '#400208',
                        'm3-light-surface': '#fffbff',
                        'm3-light-on-surface': '#201a1a',
                        'm3-light-surface-variant': '#f4dddd',
                        'm3-light-outline': '#857372',
                        'm3-dark-primary': '#ffb3b3',
                        'm3-dark-on-primary': '#5f131b',
                        'm3-dark-primary-container': '#7e2a2f',
                        'm3-dark-on-primary-container': '#ffdad9',
                        'm3-dark-surface': '#1a1111',
                        'm3-dark-on-surface': '#ece0df',
                        'm3-dark-surface-variant': '#534343',
                        'm3-dark-outline': '#a08c8c',
                    },
                    borderRadius: {
                        'm3-xl': '28px',
                        'm3-2xl': '32px',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Material You Background Shapes */
        .m3-bg-ornament {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            border-radius: 100%;
            opacity: 0.6;
            transition: all 0.8s ease;
        }
        
        .shape-1 {
            width: 300px; height: 300px;
            top: -50px; left: -50px;
            background: #ffdad9;
        }
        .dark .shape-1 { background: #5f131b; opacity: 0.4; }

        .shape-2 {
            width: 250px; height: 250px;
            bottom: 10%; right: -50px;
            background: #f4dddd;
        }
        .dark .shape-2 { background: #7e2a2f; opacity: 0.3; }

        .m3-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
        }
        
        /* Hiệu ứng thu phóng cho Card */
        .m3-card-interactive:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
        }
        .dark .m3-card-interactive:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Hiệu ứng phóng to nhẹ cho nút */
        .m3-btn-pill {
            border-radius: 100px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .m3-btn-pill:active {
            transform: scale(0.95);
        }

        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple:after {
            content: "";
            display: block;
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform .5s, opacity 1s;
        }
        .ripple:active:after {
            transform: scale(0, 0);
            opacity: .3;
            transition: 0s;
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-m3-light-surface dark:bg-m3-dark-surface text-m3-light-on-surface dark:text-m3-dark-on-surface pb-16 min-h-screen">

    <!-- Material You Background Ornaments -->
    <div class="m3-bg-ornament shape-1"></div>
    <div class="m3-bg-ornament shape-2"></div>

    <!-- Theme Switcher -->
    <div class="fixed top-6 right-6 z-50">
        <button id="theme-toggle" aria-label="Đổi giao diện" class="w-14 h-14 bg-m3-light-primary-container/80 dark:bg-m3-dark-primary-container/80 text-m3-light-on-primary-container dark:text-m3-dark-on-primary-container rounded-2xl shadow-lg flex items-center justify-center transition-all ripple backdrop-blur-md border border-white/20 hover:scale-110 active:scale-90">
            <svg id="theme-toggle-light-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 15a5 5 0 100-10 5 5 0 000 10zM10 0a1 1 0 011 1v2a1 1 0 11-2 0V1a1 1 0 011-1zM10 17a1 1 0 011 1v2a1 1 0 11-2 0v-2a1 1 0 011-1zM3.515 3.515a1 1 0 011.414 0l1.414 1.414a1 1 0 11-1.414 1.414L3.515 4.93a1 1 0 010-1.414zM13.657 13.657a1 1 0 011.414 0l1.414 1.414a1 1 0 11-1.414 1.414l-1.414-1.414a1 1 0 010-1.414zM0 10a1 1 0 011-1h2a1 1 0 110 2H1a1 1 0 01-1-1zM17 10a1 1 0 011-1h2a1 1 0 110 2h-2a1 1 0 01-1-1zM3.515 16.485a1 1 0 010-1.414l1.414-1.414a1 1 0 111.414 1.414l-1.414 1.414a1 1 0 01-1.414 0zM13.657 6.343a1 1 0 010-1.414l1.414-1.414a1 1 0 111.414 1.414L15.07 6.343a1 1 0 01-1.414 0z"></path>
            </svg>
            <svg id="theme-toggle-dark-icon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
        </button>
    </div>

    <!-- Hero Header -->
    <header class="max-w-md mx-auto pt-16 px-6 text-center">
        <div class="relative inline-block mb-6 group">
            <div class="absolute inset-0 bg-m3-light-primary dark:bg-m3-dark-primary rounded-m3-2xl blur-xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
            <img src="856.jpg" alt="Logo Bích Cao" class="relative w-36 h-36 rounded-m3-2xl shadow-sm border-2 border-white/50 dark:border-white/10 mx-auto object-cover transform transition-transform duration-500 group-hover:scale-105" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
        </div>
        <h1 class="text-4xl font-bold text-m3-light-primary dark:text-m3-dark-primary mb-2 tracking-tight transition-all">Bánh Cuốn Nóng</h1>
        <h2 class="text-xl font-medium text-m3-light-on-surface/60 dark:text-m3-dark-on-surface/60 tracking-wide">BÍCH CAO</h2>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-md mx-auto mt-10 px-4 space-y-4">
        
        <!-- Contact Information (Glass Surface) -->
        <section class="bg-white/60 dark:bg-white/5 rounded-m3-xl p-4 space-y-1 border border-white/40 dark:border-white/10 m3-card m3-card-interactive">
            <!-- Address Link -->
            <a href="https://www.google.com/maps/search/?api=1&query=15+Lê+Lợi+Đắk+Đoa+Gia+Lai" target="_blank" class="flex items-center space-x-4 p-4 rounded-2xl hover:bg-m3-light-primary/10 dark:hover:bg-m3-dark-primary/10 transition-colors ripple">
                <span class="bg-m3-light-primary dark:bg-m3-dark-primary text-m3-light-on-primary dark:text-m3-dark-on-primary p-3 rounded-2xl shadow-md transform transition-transform group-hover:scale-110">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    </svg>
                </span>
                <div>
                    <p class="font-semibold text-lg">15 Lê Lợi, Đắk Đoa</p>
                    <p class="text-sm opacity-60 italic">Xem vị trí trên bản đồ</p>
                </div>
            </a>

            <!-- Phone Link -->
            <a href="tel:0917724781" class="flex items-center space-x-4 p-4 rounded-2xl hover:bg-m3-light-primary/10 dark:hover:bg-m3-dark-primary/10 transition-colors ripple">
                <span class="bg-green-600 dark:bg-green-500 text-white p-3 rounded-2xl shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                    </svg>
                </span>
                <p class="font-bold text-lg tracking-wider">0917.724.781</p>
            </a>
        </section>

        <!-- Menu Section (Elevated Style) -->
        <section class="bg-m3-light-surface-variant/40 dark:bg-m3-dark-surface-variant/20 rounded-m3-2xl p-6 border border-white/30 dark:border-white/5 m3-card m3-card-interactive">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-m3-light-primary dark:text-m3-dark-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                Thực Đơn Menu
            </h3>
            <div class="grid grid-cols-1 gap-3">
                <div class="flex justify-between items-center p-4 bg-white/50 dark:bg-black/20 rounded-2xl hover:scale-[1.02] transition-transform cursor-pointer">
                    <span class="font-medium">Phần nhỏ</span>
                    <span class="bg-m3-light-primary-container dark:bg-m3-dark-primary-container text-m3-light-on-primary-container dark:text-m3-dark-on-primary-container px-4 py-1 rounded-full font-bold">15K</span>
                </div>
                <div class="flex justify-between items-center p-4 bg-white/50 dark:bg-black/20 rounded-2xl hover:scale-[1.02] transition-transform cursor-pointer">
                    <span class="font-medium">Phần vừa</span>
                    <span class="bg-m3-light-primary-container dark:bg-m3-dark-primary-container text-m3-light-on-primary-container dark:text-m3-dark-on-primary-container px-4 py-1 rounded-full font-bold">20K</span>
                </div>
                <div class="flex justify-between items-center p-4 bg-white/50 dark:bg-black/20 rounded-2xl hover:scale-[1.02] transition-transform cursor-pointer">
                    <span class="font-medium">Phần lớn</span>
                    <span class="bg-m3-light-primary-container dark:bg-m3-dark-primary-container text-m3-light-on-primary-container dark:text-m3-dark-on-primary-container px-4 py-1 rounded-full font-bold">25K</span>
                </div>
                <div class="flex justify-between items-center p-4 bg-m3-light-primary dark:bg-m3-dark-primary text-m3-light-on-primary dark:text-m3-dark-on-primary rounded-2xl shadow-lg scale-[1.03] transform hover:scale-[1.06] transition-transform cursor-pointer">
                    <span class="font-bold">Phần Đặc Biệt</span>
                    <span class="bg-white/20 px-4 py-1 rounded-full font-bold">30K</span>
                </div>
            </div>
        </section>

        <!-- Media Gallery -->
        <section class="space-y-4">
            <h3 class="text-xl font-bold px-2 flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-m3-light-primary dark:text-m3-dark-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                Hình Ảnh Tiệm
            </h3>
            <div class="space-y-4">
                <div class="relative group overflow-hidden rounded-m3-2xl shadow-md border border-white/30 dark:border-white/10 m3-card">
                    <img src="851.jpg" alt="Thịt heo quay" class="w-full h-72 object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/600x400?text=Thit+Heo+Quay'">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6 translate-y-2 group-hover:translate-y-0 transition-transform">
                        <p class="text-white font-bold text-sm tracking-widest uppercase">Heo quay giòn rụm mỗi ngày</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="group overflow-hidden rounded-m3-xl shadow-md border border-white/20 m3-card">
                        <img src="853.jpg" alt="Bánh cuốn 1" class="w-full h-52 object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/300x400?text=Banh+Cuon+1'">
                    </div>
                    <div class="group overflow-hidden rounded-m3-xl shadow-md border border-white/20 m3-card">
                        <img src="852.jpg" alt="Bánh cuốn 2" class="w-full h-52 object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/300x400?text=Banh+Cuon+2'">
                    </div>
                </div>
            </div>
        </section>

        <!-- CTA Action -->
        <footer class="pt-8 text-center">
            <a href="tel:0917724781" class="inline-flex items-center gap-3 px-12 py-5 bg-m3-light-primary dark:bg-m3-dark-primary text-m3-light-on-primary dark:text-m3-dark-on-primary m3-btn-pill font-bold text-xl shadow-xl hover:shadow-2xl hover:scale-105 active:scale-95 transition-all ripple">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
                GỌI ĐẶT NGAY
            </a>
            <p class="mt-8 text-m3-light-on-surface/40 dark:text-m3-dark-on-surface/40 text-sm font-medium">Bánh Cuốn Bích Cao • Đắk Đoa</p>
        </footer>
    </main>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });
    </script>
</body>
</html>
